<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Quantum Sudoku Battle</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p-color: #00d2ff; --c-color: #ff4757; --accent-gold: #ffcc00; }
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background: #ffffff; color: #333; overflow-x: hidden; touch-action: manipulation; }
        
        .overlay-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; overflow-y: auto; }
        .how-to-play { max-width: 500px; background: #f8f9fa; padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 2px dashed #ccc; font-size: 0.85rem; }
        
        .char-card-container { display: flex; gap: 15px; margin-top: 10px; padding-bottom: 50px; }
        .char-card { width: 140px; border: 3px solid #eee; border-radius: 20px; padding: 10px; cursor: pointer; transition: 0.3s; text-align: center; background: #fff; }
        .char-card:hover { transform: translateY(-10px); border-color: var(--p-color); box-shadow: 0 10px 20px rgba(0,210,255,0.2); }
        .char-card img { width: 100%; height: 110px; border-radius: 15px; object-fit: cover; background: #eee; pointer-events: none; }

        #result-screen { display: none; background: rgba(255,255,255,0.98); z-index: 8000; align-items: center; justify-content: center; }
        .result-box { text-align: center; padding: 50px; border-radius: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.15); background: white; border: 8px solid #f0f0f0; max-width: 90%; }

        .battle-stage { display: flex; justify-content: center; align-items: flex-start; gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .board-wrapper { flex: 1; max-width: 360px; background: #f8f9fa; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        
        .portrait { width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-size: cover; background-position: center; margin-bottom: 10px; }
        .energy-bar-bg { width: 100%; height: 14px; background: #ddd; border-radius: 7px; overflow: hidden; margin-bottom: 15px; border: 2px solid #eee; }
        .energy-fill { height: 100%; width: 0%; transition: width 0.2s; }
        .energy-penalty { animation: penalty-flash 0.5s; background: #333 !important; }
        @keyframes penalty-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .sudoku-grid { border: 4px solid #333 !important; background: white; width: 100%; border-collapse: collapse; table-layout: fixed; }
        .sudoku-grid td { border: 1px solid #ddd; width: 25%; padding: 0; position: relative; }
        .bold-right { border-right: 4px solid #333 !important; }
        .bold-bottom { border-bottom: 4px solid #333 !important; }
        .cell { width: 100%; aspect-ratio: 1/1; position: relative; cursor: pointer; }
        .cell-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; }
        .fixed { background: #f0f0f0; color: #555; }
        .wrong { color: #ff4757; background: rgba(255, 71, 87, 0.2); animation: shake-anim 0.3s; }

        #cross-selector { position: absolute; display: none; width: 140px; height: 140px; z-index: 6000; pointer-events: none; }
        .cross-btn { 
            position: absolute; width: 44px; height: 44px; border: 3px solid #333; border-radius: 50%; 
            background: white; color: #333; font-weight: 900; font-size: 1.4rem; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: auto; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 0 #333;
        }
        .cross-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; background: var(--p-color); color: white; }
        .btn-up { top: 0; left: 48px; } .btn-right { top: 48px; right: 0; } .btn-down { bottom: 0; left: 48px; } .btn-left { top: 48px; left: 0; }

        .ultimate-btn { width: 100%; height: 55px; border-radius: 30px; border: none; background: #ccc; color: white; font-weight: 800; margin-top: 15px; transition: 0.3s; box-shadow: 0 5px 0 #999; font-size: 1.2rem; }
        .ultimate-btn.ready { background: linear-gradient(45deg, var(--p-color), #3a7bd5); cursor: pointer; animation: bounce 0.8s infinite; box-shadow: 0 5px 0 #0076bb; }

        .cutin { position: fixed; top: 50%; left: -100%; width: 100%; height: 140px; background: rgba(0,0,0,0.9); z-index: 10000; transform: translateY(-50%); color: white; display: flex; align-items: center; transition: 0.4s; border-top: 4px solid var(--accent-gold); border-bottom: 4px solid var(--accent-gold); }
        .cutin.active { left: 0; opacity: 1; }
        .attack-pop { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: var(--accent-gold); font-size: 3.5rem; font-weight: 900; -webkit-text-stroke: 2px black; pointer-events: none; z-index: 100; display: none; }
        @keyframes shake-anim { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .shake { animation: shake-anim 0.4s both; }
    </style>
</head>
<body>

<div id="selector-screen" class="overlay-screen">
    <h1 class="font-weight-bold mb-3">QUANTUM BATTLE</h1>
    <div id="win-streak-badge" class="badge badge-primary mb-3" style="display:none; font-size:1.2rem; padding:10px 20px; border-radius:20px;">0 Win Streak</div>
    <div class="how-to-play">
        <h5 class="font-weight-bold mb-3 text-center">⚔️ 遊び方とルール</h5>
        <ul class="list-unstyled mb-0">
            <li>🔹 マスをクリックし、十字キーで入力（<b>上:1 / 右:2 / 下:3 / 左:4</b>）</li>
            <li>🔹 <b>縦・横・2x2ブロック</b>のいずれかが揃うと相手を攻撃！</li>
            <li>🔹 ミスすると溜まったゲージが0になります！</li>
            <li class="mt-2 small">⚡ <b>AKIRA:</b> ヒント2つ / 🔮 <b>KOTO:</b> 3回攻撃 / ☀️ <b>LUX:</b> 空欄半分を埋める</li>
        </ul>
    </div>
    <div class="char-card-container">
        <div class="char-card" onclick="playSelectAndStart('AKIRA')"><img src="akira.jpg"><h5>AKIRA</h5></div>
        <div class="char-card" onclick="playSelectAndStart('KOTO')"><img src="koto.jpg"><h5>KOTO</h5></div>
        <div class="char-card" onclick="playSelectAndStart('LUX')"><img src="lux.jpg"><h5>LUX</h5></div>
    </div>
</div>

<div id="result-screen" class="overlay-screen">
    <div class="result-box">
        <h1 id="result-title" class="display-3 font-weight-bold mb-4"></h1>
        <div class="mb-4">
            <button class="btn btn-lg btn-primary px-5 py-3 mb-3 rounded-pill font-weight-bold" onclick="rematch()">REMATCH (再戦)</button><br>
            <button class="btn btn-outline-secondary px-5 rounded-pill" onclick="toTitle()">BACK TO TITLE</button>
        </div>
        <p id="result-streak-info" class="h5 text-muted"></p>
    </div>
</div>

<div id="cross-selector">
    <div class="cross-btn btn-up" onclick="selectNumber(1)">1</div>
    <div class="cross-btn btn-right" onclick="selectNumber(2)">2</div>
    <div class="cross-btn btn-down" onclick="selectNumber(3)">3</div>
    <div class="cross-btn btn-left" onclick="selectNumber(4)">4</div>
</div>

<div id="cutin-bar" class="cutin">
    <div id="cutin-img" style="width:140px; height:140px; background-size:cover; border-right:5px solid var(--accent-gold);"></div>
    <div class="ml-4"><h2 id="cutin-name" class="font-weight-bold mb-0"></h2><h4 id="cutin-skill" class="text-warning small"></h4></div>
</div>

<div class="battle-stage">
    <div class="board-wrapper">
        <div class="portrait" id="p-portrait"></div>
        <div class="energy-bar-bg"><div id="p-energy" class="energy-fill" style="background:var(--p-color)"></div></div>
        <div class="font-weight-bold small mb-1" style="color:var(--p-color)">PLAYER: <span id="p-name-label"></span></div>
        <table id="p-grid" class="sudoku-grid"></table>
        <button id="p-skill-btn" class="ultimate-btn" onclick="useSkill()">ULTIMATE</button>
        <div id="p-attack-pop" class="attack-pop">ATTACK!</div>
    </div>
    <div class="board-wrapper">
        <div class="portrait" id="c-portrait"></div>
        <div class="energy-bar-bg"><div id="c-energy" class="energy-fill" style="background:var(--c-color)"></div></div>
        <div class="font-weight-bold small mb-1" style="color:var(--c-color)">CPU: <span id="c-name-label"></span></div>
        <table id="c-grid" class="sudoku-grid"></table>
        <button class="ultimate-btn" disabled>CPU THINKING...</button>
        <div id="c-attack-pop" class="attack-pop">ATTACK!</div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script>
const units = {
    AKIRA: { img: 'akira.jpg', skill: '電子固定 [Fixed Obs.]', color: '#00d2ff' },
    KOTO: { img: 'koto.jpg', skill: '事象封印 [Event Seal]', color: '#9d50bb' },
    LUX: { img: 'lux.jpg', skill: '光子透過 [Photon Leap]', color: '#ffcc00' }
};
let pUnit, cUnit, ansGrid = [], isBusy = false, activeCell = null, gameActive = false;
let pEn = 0, cEn = 0, winStreak = 0, bgmAudio;

function playSE(file) { new Audio(file).play().catch(e=>{}); }

function playSelectAndStart(choice) {
    pUnit = choice; playSE('select.mp3'); setTimeout(() => initGame(), 200);
}

function initGame() {
    gameActive = true;
    cUnit = Object.keys(units)[Math.floor(Math.random()*3)];
    ansGrid = generateSol();
    pEn = 0; cEn = 0;
    $('#p-portrait').css('background-image', `url(${units[pUnit].img})`);
    $('#c-portrait').css('background-image', `url(${units[cUnit].img})`);
    $('#p-name-label').text(pUnit); $('#c-name-label').text(cUnit);
    if(!bgmAudio) { bgmAudio = new Audio('bgm.mp3'); bgmAudio.loop = true; bgmAudio.volume = 0.4; }
    bgmAudio.play().catch(e=>{});
    $('#selector-screen, #result-screen').fadeOut(300);
    $('#p-grid, #c-grid').empty().data('c', 0);
    setupBoards();
    gameLoop();
}

function generateSol() {
    const grid = Array.from({length:4}, () => Array(4).fill(0));
    const check = (r, c, v) => {
        for(let i=0; i<4; i++) if(grid[r][i] === v || grid[i][c] === v) return false;
        let br = Math.floor(r/2)*2, bc = Math.floor(c/2)*2;
        for(let i=0; i<2; i++) for(let j=0; j<2; j++) if(grid[br+i][bc+j] === v) return false;
        return true;
    };
    const fill = (pos) => {
        if(pos === 16) return true;
        let r = Math.floor(pos/4), c = pos%4, nums = [1,2,3,4].sort(()=>Math.random()-0.5);
        for(let v of nums) if(check(r,c,v)){ grid[r][c]=v; if(fill(pos+1)) return true; grid[r][c]=0; }
        return false;
    };
    fill(0); return grid;
}

function setupBoards() {
    ['p', 'c'].forEach(id => {
        let html = '';
        for(let r=0; r<4; r++){
            html += '<tr>';
            for(let c=0; c<4; c++){
                let cls = `${r===1?'bold-bottom':''} ${c===1?'bold-right':''}`;
                html += `<td class="${cls}"><div class="cell" id="${id}_${r}_${c}" onclick="openCrossSelector(this)"><div class="cell-value"></div></div></td>`;
            }
            html += '</tr>';
        }
        $(`#${id}-grid`).append(html);
    });
    let hintCount = Math.max(1, 4 - Math.floor(winStreak / 2));
    for(let i=0; i<hintCount; i++){
        let r = Math.floor(Math.random()*4), c = Math.floor(Math.random()*4);
        if(!$(`#p_${r}_${c}`).hasClass('fixed')){
            $(`#p_${r}_${c}`).addClass('fixed').find('.cell-value').text(ansGrid[r][c]);
            $(`#c_${r}_${c}`).addClass('fixed').find('.cell-value').text(ansGrid[r][c]);
        }
    }
}

function openCrossSelector(el) {
    if(!gameActive || $(el).hasClass('fixed') || el.id.startsWith('c')) return;
    activeCell = el;
    let pos = $(el).offset();
    let cellW = $(el).width();
    $('#cross-selector').css({ top: pos.top + cellW/2 - 70, left: pos.left + cellW/2 - 70 }).fadeIn(100);
}

function selectNumber(num) {
    if(!activeCell) return;
    $('#cross-selector').fadeOut(100);
    let idParts = activeCell.id.split('_');
    let r = parseInt(idParts[1]), c = parseInt(idParts[2]);
    if(num !== ansGrid[r][c]) {
        $(activeCell).addClass('wrong'); pEn = 0; $('#p-energy').addClass('energy-penalty');
        setTimeout(() => { $(activeCell).removeClass('wrong'); $('#p-energy').removeClass('energy-penalty'); }, 500);
    } else {
        $(activeCell).removeClass('wrong').addClass('fixed'); $(activeCell).find('.cell-value').text(num);
        pEn = Math.min(100, pEn + 8); checkMatch('p');
    }
    activeCell = null; checkWin();
}

function checkMatch(pre) {
    let currentMatchCount = 0;
    // 縦横チェック
    for(let i=0; i<4; i++){
        let rowM=true, colM=true;
        for(let j=0; j<4; j++){
            if($(`#${pre}_${i}_${j}`).find('.cell-value').text() != ansGrid[i][j]) rowM=false;
            if($(`#${pre}_${j}_${i}`).find('.cell-value').text() != ansGrid[j][i]) colM=false;
        }
        if(rowM) currentMatchCount++; if(colM) currentMatchCount++;
    }
    // 2x2ブロックチェック
    const blocks = [[0,0],[0,2],[2,0],[2,2]];
    blocks.forEach(b => {
        let blockM = true;
        for(let r=0; r<2; r++) for(let c=0; c<2; c++) {
            if($(`#${pre}_${b[0]+r}_${b[1]+c}`).find('.cell-value').text() != ansGrid[b[0]+r][b[1]+c]) blockM=false;
        }
        if(blockM) currentMatchCount++;
    });

    if(currentMatchCount > ($(`#${pre}-grid`).data('c')||0)) {
        $(`#${pre}-grid`).data('c', currentMatchCount);
        playSE('attack.m4a');
        $(`#${pre}-attack-pop`).show().fadeOut(1000);
        let target = pre==='p'?'c':'p';
        $(`#${target}-grid`).addClass('shake');
        setTimeout(()=> $(`#${target}-grid`).removeClass('shake'), 400);
        let filled = [];
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) {
            let $el = $(`#${target}_${r}_${c}`);
            if($el.hasClass('fixed') && !$el.attr('data-init')) filled.push($el);
        }
        if(filled.length > 0) filled[Math.floor(Math.random()*filled.length)].removeClass('fixed').find('.cell-value').text('');
    }
}

function useSkill(isCPU=false) {
    if(!gameActive || (!isCPU && (pEn < 100 || isBusy))) return;
    isBusy = true; const u = isCPU ? cUnit : pUnit;
    $('#cutin-img').css('background-image', `url(${units[u].img})`);
    $('#cutin-name').text(u); $('#cutin-skill').text(units[u].skill);
    $('#cutin-bar').addClass('active'); playSE('ultimate.m4a');
    setTimeout(() => {
        let tid = isCPU?'c':'p';
        if(u==='AKIRA'){
            let f=0; for(let r=0; r<4; r++) for(let c=0; c<4; c++)
                if(!$(`#${tid}_${r}_${c}`).hasClass('fixed') && f<2){ $(`#${tid}_${r}_${c}`).addClass('fixed').find('.cell-value').text(ansGrid[r][c]); f++; }
        } else if(u==='KOTO'){
            for(let i=0; i<3; i++) setTimeout(()=>checkMatch(tid), i*200);
        } else if(u==='LUX'){
            let empty = []; for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(!$(`#${tid}_${r}_${c}`).hasClass('fixed')) empty.push({r,c});
            let fc = Math.ceil(empty.length/2);
            for(let i=0; i<fc; i++){ if(empty.length===0) break; let cell = empty.splice(Math.floor(Math.random()*empty.length),1)[0];
                $(`#${tid}_${cell.r}_${cell.c}`).addClass('fixed').find('.cell-value').text(ansGrid[cell.r][cell.c]); }
        }
        if(isCPU) cEn=0; else { pEn=0; $('#p-skill-btn').removeClass('ready'); }
        $('#cutin-bar').removeClass('active'); isBusy=false; checkWin();
    }, 1000);
}

function gameLoop() {
    if(!gameActive) return;
    if(!isBusy) {
        let cpuBonus = Math.min(0.4, winStreak * 0.06); 
        pEn = Math.min(100, pEn + (pUnit==='LUX'?0.2:0.6));
        cEn = Math.min(100, cEn + (cUnit==='LUX'?0.15:0.3) + cpuBonus);
        $('#p-energy').css('width', pEn+'%'); $('#c-energy').css('width', cEn+'%');
        if(pEn>=100) $('#p-skill-btn').addClass('ready');
        if(cEn>=100) useSkill(true);
    }
    let cpuThinkingChance = 0.96 - Math.min(0.04, winStreak * 0.01);
    if(Math.random() > cpuThinkingChance && !isBusy){
        let empty = []; for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(!$(`#c_${r}_${c}`).hasClass('fixed')) empty.push({r,c});
        if(empty.length>0){ let t = empty[Math.floor(Math.random()*empty.length)]; $(`#c_${t.r}_${t.c}`).addClass('fixed').find('.cell-value').text(ansGrid[t.r][t.c]); checkMatch('c'); }
    }
    setTimeout(gameLoop, 250);
}

function checkWin() {
    if(!gameActive) return;
    const full = (pre) => {
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) if($(`#${pre}_${r}_${c}`).find('.cell-value').text() != ansGrid[r][c]) return false;
        return true;
    };
    if(full('p')) showResult(true); else if(full('c')) showResult(false);
}

function showResult(isWin) {
    gameActive = false; if(isWin) winStreak++; else winStreak = 0;
    $('#result-title').text(isWin ? "VICTORY!" : "DEFEAT...");
    $('#result-title').css('color', isWin ? 'var(--p-color)' : 'var(--c-color)');
    $('#result-streak-info').text(isWin ? `Current Win Streak: ${winStreak}` : "連勝が途絶えました...");
    $('#result-screen').css('display', 'flex').hide().fadeIn(500);
    if(winStreak > 0) $('#win-streak-badge').text(`${winStreak} Win Streak`).show(); else $('#win-streak-badge').hide();
}

function rematch() { $('#result-screen').fadeOut(300, () => initGame()); }
function toTitle() { $('#result-screen').fadeOut(300); $('#selector-screen').fadeIn(300); }

$(document).on('mousedown touchstart', function(e) { 
    if(!$("#cross-selector").is(e.target) && $("#cross-selector").has(e.target).length === 0) $("#cross-selector").fadeOut(100); 
});
</script>
</body>
</html>
